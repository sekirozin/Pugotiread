services:
  pugotiread:
    build:
      context: .
      dockerfile: Dockerfile
      additional_contexts:
        pugotidownloader: ../Pugotidownloader
    container_name: pugotiread
    ports:
      - "8099:8099"
    environment:
      PORT: "8099"
      SESSION_SECRET: "troque-este-segredo-no-zimaos"
      PUGOTILAB_PROFILE_URL: "http://pugotilab-auth:8080/auth/api/profile"
      PUGOTILAB_AUTH_URL: "https://pugotilab.com/auth"
      PUGOTILAB_LOGOUT_URL: "https://pugotilab.com/auth/logout"
      GOOGLE_CLIENT_ID: "684109969699-ugf51n6innd2ci9i0vidh2n9p5nf5s4r.apps.googleusercontent.com"
      DATA_FILE: "/app/data/store.json"
      DB_FILE: "/app/data/store.db"
      CACHE_DIR: "/app/data/cache"
      MEDIA_ROOT: "/media"
      VAULT_MEDIA_ROOT: "/media/Cofre"
      PUGOTI_COMMAND: "/opt/pugoti/bin/pugoti"
      PUGOTI_AUTO_SYNC_ENABLED: "true"
      PUGOTI_SYNC_INTERVAL_MS: "7200000"
    volumes:
      - /DATA/AppData/pugotiread/data:/app/data
      - /DATA/AppData/big-bear-nextcloud/html/data/casaos/files/Midias:/media
    networks:
      - default
      - pugotilab
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:' + (process.env.PORT || '8099') + '/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    restart: unless-stopped

  pugotiread-autoheal:
    image: docker:27-cli
    container_name: pugotiread-autoheal
    command: >
      sh -c 'while true; do
        status=$$(docker inspect -f "{{.State.Health.Status}}" pugotiread 2>/dev/null || true);
        if [ "$$status" = "unhealthy" ]; then
          docker restart pugotiread;
        fi;
        sleep 30;
      done'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

networks:
  pugotilab:
    external: true
